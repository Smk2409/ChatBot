<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMMs AI ChatBot</title>

```
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
        background:linear-gradient(
            -45deg,
            #ff6b6b,
            #feca57,
            #48dbfb,
            #5f27cd,
            #00d2d3
        );
        background-size:400% 400%;
        animation:gradientBG 12s ease infinite;
    }

    @keyframes gradientBG{
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
    }

    .container{
        width:100%;
        max-width:850px;
        background:rgba(255,255,255,0.18);
        backdrop-filter:blur(20px);
        border-radius:30px;
        padding:35px;
        border:1px solid rgba(255,255,255,0.25);
        box-shadow:0 15px 40px rgba(0,0,0,0.25);
    }

    .bot-icon{
        text-align:center;
        font-size:70px;
        margin-bottom:10px;
        animation:float 3s infinite ease-in-out;
    }

    @keyframes float{
        0%,100%{
            transform:translateY(0);
        }
        50%{
            transform:translateY(-10px);
        }
    }

    .title{
        text-align:center;
        margin-bottom:30px;
    }

    .title h1{
        font-size:2.8rem;
        background:linear-gradient(
            90deg,
            #ff9f43,
            #ee5253,
            #5f27cd,
            #00d2d3
        );
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    .title p{
        color:white;
        margin-top:8px;
        font-size:15px;
    }

    form{
        display:flex;
        flex-direction:column;
        gap:18px;
    }

    input[type="text"]{
        width:100%;
        padding:16px;
        border:none;
        border-radius:15px;
        font-size:16px;
        background:white;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    input[type="text"]:focus{
        outline:none;
        box-shadow:0 0 15px #48dbfb;
    }

    .file-upload{
        padding:25px;
        border-radius:15px;
        border:3px dashed #00d2d3;
        text-align:center;
        background:rgba(255,255,255,0.15);
        color:white;
    }

    .file-upload label{
        font-size:17px;
        font-weight:bold;
    }

    input[type="file"]{
        margin-top:10px;
        color:white;
        width:100%;
    }

    button{
        border:none;
        padding:16px;
        border-radius:15px;
        font-size:18px;
        font-weight:bold;
        cursor:pointer;
        color:white;
        background:linear-gradient(
            90deg,
            #ff6b6b,
            #f368e0
        );
        transition:0.3s;
    }

    button:hover{
        transform:translateY(-3px);
        box-shadow:0 10px 20px rgba(243,104,224,0.5);
    }

    .response{
        margin-top:30px;
        background:white;
        border-radius:20px;
        padding:25px;
        box-shadow:0 10px 25px rgba(0,0,0,0.15);
        animation:fadeIn .5s ease;
        border-left:8px solid #5f27cd;
    }

    .response h3{
        color:#5f27cd;
        margin-bottom:15px;
        font-size:22px;
    }

    .response p{
        color:#222;
        line-height:1.8;
        font-size:17px;
        white-space:pre-wrap;
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    .footer{
        margin-top:20px;
        text-align:center;
        color:white;
        font-size:14px;
    }

    @media(max-width:768px){

        .container{
            padding:20px;
        }

        .title h1{
            font-size:2rem;
        }

        .bot-icon{
            font-size:55px;
        }

        button{
            font-size:16px;
        }
    }
</style>
```

</head>
<body>

```
<div class="container">

    <div class="bot-icon">🤖</div>

    <div class="title">
        <h1>OMMs AI Assistant</h1>
        <p>Ask questions and upload PDF documents</p>
    </div>

    <form method="POST" enctype="multipart/form-data">

        <input
            type="text"
            name="user"
            placeholder="💬 Ask anything..."
            required
        >

        <div class="file-upload">
            <label>📄 Upload PDF File</label><br>
            <input type="file" name="file" accept=".pdf">
        </div>

        <button type="submit"
                onclick="this.innerHTML='⏳ Thinking...'">
            🚀 Ask AI
        </button>

    </form>

    {% if output %}
    <div class="response">
        <h3>✨ AI Response</h3>
        <p>{{ output }}</p>
    </div>
    {% endif %}

    <div class="footer">
        Powered by OMMs AI ⚡
    </div>

</div>
```

</body>
</html>
